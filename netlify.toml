[build]
  command = "npm install && cd client && npm install && npm run typecheck && DISABLE_ESLINT_PLUGIN=true npm run build"
  publish = "client/build"

[build.environment]
  NODE_VERSION = "18"
  DISABLE_ESLINT_PLUGIN = "true"

[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url.com/api/:splat"
  status = 200

[[redirects]]
  from = "/socket.io/*"
  to = "https://your-backend-url.com/socket.io/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200 